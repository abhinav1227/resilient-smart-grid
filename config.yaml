data:
  grid_case: "case118" # Power grid case to use (e.g., case118, case300)
  n_timesteps: 2500
  train_ratio: 0.8
  seed: 42
  window_size: 5            # For the STGAT temporal window
  force_extract: false
  force_transform: false

model:
  in_channels: 2
  hidden_dim: 64
  out_channels: 2
  num_layers: 2             # DeepPowerSTGAT depth
  lr: 0.001
  weight_decay: 0.0001
  epochs: 150
  save_path: "models/trained_gcn.pth"

training:
  batch_size: 32
  adversarial_training: true
  force_retrain: false
  pgd_alpha: 0.5
  pgd_iters: 3

attack:
  epsilon: 0.5             # Logic: Proportional 30% attack margin
  alpha: 0.2
  num_iter: 10
  num_samples: 50
  feature_bounds: [-1.5, 1.5]

explanation:
  plot_filename: "results/explanation_heatmap.png"