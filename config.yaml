data:
  grid_case: "case14"      # Change to case14, case30, case118, (39, 57, 145, 300) etc.
  n_timesteps: 500
  train_ratio: 0.8
  seed: 42
  save_path: "data/generated_data.npz"

model:
  in_channels: 2
  hidden_dim: 32           # Increased capacity
  out_channels: 2
  lr: 0.005
  weight_decay: 0.0001
  epochs: 50
  save_path: "models/trained_gcn.pth"

training:
  batch_size: 32
  adversarial_training: true
  pgd_alpha: 0.5             # Larger step size for faster training
  pgd_iters: 3               # Only 3 iterations during training to save time

attack:
  epsilon: 1.5          # Now represents a 30% proportional attack (x Step size for the attack)
  #detection_threshold: 0.015 # L1 Error threshold indicating a grid anomaly(0.05, 0.02, 0.015(tighter threshold))
  alpha: 0.2                 # The small step size for iterative attack
  num_iter: 10               # Number of gradient recalculations for the attack
  num_samples: 50
  feature_bounds: [-1.5, 1.5] # Constrain attack to a realistic physical margin i.e, attacker is bound to maximum 30% manipulation

explanation:
  plot_filename: "results/explanation_heatmap.png"